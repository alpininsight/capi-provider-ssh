name: Container Build (Python)

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: container-python-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/alpininsight/capi-provider-ssh-python

jobs:
  build-and-push:
    name: Build and publish Python container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up GitVersion
        uses: gittools/actions/gitversion/setup@8fedf8a6f6cec22c9eaa66ee693f5b1f315dcbdd # v3.1.2
        with:
          versionSpec: '5.x'
          preferLatestVersion: true

      - name: Calculate version
        id: gitversion
        uses: gittools/actions/gitversion/execute@8fedf8a6f6cec22c9eaa66ee693f5b1f315dcbdd # v3.1.2
        with:
          useConfigFile: true
          configFilePath: GitVersion.yml
          overrideConfig: |
            update-build-number=false

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAG="v${{ steps.gitversion.outputs.MajorMinorPatch }}"
            # Guard: skip semver tag if it already exists (no-bump commits)
            if git rev-parse "${TAG}" >/dev/null 2>&1; then
              echo "::warning::Tag ${TAG} already exists — skipping semver tag to preserve immutability"
              echo "tag=" >> "${GITHUB_OUTPUT}"
            else
              echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
            fi
          elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            # Keep develop on the same semantic line as main while preserving prerelease semantics.
            echo "tag=v${{ steps.gitversion.outputs.SemVer }}" >> "${GITHUB_OUTPUT}"
          else
            echo "tag=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=pr
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=raw,value=${{ steps.version.outputs.tag }},enable=${{ steps.version.outputs.tag != '' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.vendor=Alpin Insight Solutions
            org.opencontainers.image.licenses=MPL-2.0
            org.opencontainers.image.url=https://github.com/alpininsight/capi-provider-ssh
            org.opencontainers.image.source=https://github.com/alpininsight/capi-provider-ssh
            org.opencontainers.image.documentation=https://github.com/alpininsight/capi-provider-ssh/tree/main/docs
            org.opencontainers.image.description=Cluster API infrastructure provider for SSH-reachable hosts
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./python
          file: ./python/Dockerfile
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build summary
        run: |
          echo "### Container Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: ${{ env.IMAGE_NAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Version: ${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Digest: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
