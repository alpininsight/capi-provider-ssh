apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sshclusters.infrastructure.alpininsight.ai
  labels:
    cluster.x-k8s.io/provider: infrastructure-ssh
spec:
  group: infrastructure.alpininsight.ai
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - controlPlaneEndpoint
              properties:
                controlPlaneEndpoint:
                  type: object
                  required:
                    - host
                    - port
                  properties:
                    host:
                      type: string
                      description: Hostname or IP of the control plane endpoint.
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      description: Port of the control plane API server.
                paused:
                  type: boolean
                  description: Indicates the resource is paused and will not be reconciled.
            status:
              type: object
              properties:
                initialization:
                  type: object
                  properties:
                    provisioned:
                      type: boolean
                      description: True when cluster infrastructure is ready.
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                failureReason:
                  type: string
                failureMessage:
                  type: string
      additionalPrinterColumns:
        - name: Endpoint
          type: string
          jsonPath: .spec.controlPlaneEndpoint.host
        - name: Ready
          type: boolean
          jsonPath: .status.initialization.provisioned
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: sshclusters
    singular: sshcluster
    kind: SSHCluster
    shortNames:
      - sshcl
    categories:
      - cluster-api
