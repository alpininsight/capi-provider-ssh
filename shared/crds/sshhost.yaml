apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sshhosts.infrastructure.alpininsight.ai
  labels:
    cluster.x-k8s.io/provider: infrastructure-ssh
    cluster.x-k8s.io/v1beta1: v1beta1
spec:
  group: infrastructure.alpininsight.ai
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - address
                - sshKeyRef
              properties:
                address:
                  type: string
                  description: SSH-reachable hostname or IP address.
                port:
                  type: integer
                  default: 22
                  minimum: 1
                  maximum: 65535
                  description: SSH port.
                user:
                  type: string
                  default: root
                  description: SSH user for authentication.
                sshKeyRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the Secret containing the SSH private key.
                    key:
                      type: string
                      default: value
                      description: Key within the Secret that holds the private key data.
                consumerRef:
                  type: object
                  description: Reference to the SSHMachine that has claimed this host. Empty means available.
                  properties:
                    kind:
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
            status:
              type: object
              properties:
                ready:
                  type: boolean
                  description: True when the host is reachable and available.
                inUse:
                  type: boolean
                  description: True when the host is claimed by an SSHMachine.
                lastProbeTime:
                  type: string
                  format: date-time
                  description: Timestamp of the last health probe attempt.
                lastProbeSuccess:
                  type: boolean
                  description: Whether the last health probe succeeded.
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: Address
          type: string
          jsonPath: .spec.address
        - name: Ready
          type: boolean
          jsonPath: .status.ready
        - name: InUse
          type: boolean
          jsonPath: .status.inUse
        - name: Consumer
          type: string
          jsonPath: .spec.consumerRef.name
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: sshhosts
    singular: sshhost
    kind: SSHHost
    shortNames:
      - sshh
    categories:
      - cluster-api
