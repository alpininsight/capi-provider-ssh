apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sshmachines.infrastructure.alpininsight.ai
  labels:
    cluster.x-k8s.io/provider: infrastructure-ssh
spec:
  group: infrastructure.alpininsight.ai
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                address:
                  type: string
                  description: >-
                    SSH-reachable hostname or IP. Set directly or populated
                    by the controller from an SSHHost when hostSelector is used.
                port:
                  type: integer
                  default: 22
                  minimum: 1
                  maximum: 65535
                  description: SSH port.
                user:
                  type: string
                  default: root
                  description: SSH user for authentication.
                sshKeyRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the Secret containing the SSH private key.
                    key:
                      type: string
                      default: value
                      description: Key within the Secret that holds the private key data.
                hostSelector:
                  type: object
                  description: >-
                    Label selector for SSHHost pool-based selection.
                    When set, the controller claims an available SSHHost
                    matching these labels and copies its address/user/sshKeyRef.
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                      description: Labels that SSHHost CRs must match.
                hostRef:
                  type: string
                  description: >-
                    Reference to the claimed SSHHost in namespace/name format.
                    Set by the controller when a host is claimed via hostSelector.
                externalEtcd:
                  type: object
                  description: >-
                    Optional external etcd wiring. When set, the controller
                    distributes certs and injects kubeadm apiServer etcd args.
                  properties:
                    endpoints:
                      type: array
                      minItems: 1
                      items:
                        type: string
                      description: List of external etcd endpoints (for example https://10.0.0.10:2379).
                    caCertRef:
                      type: object
                      required:
                        - name
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                          default: value
                    clientCertRef:
                      type: object
                      required:
                        - name
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                          default: value
                    clientKeyRef:
                      type: object
                      required:
                        - name
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                          default: value
                    files:
                      type: object
                      properties:
                        caFile:
                          type: string
                          default: /etc/kubernetes/pki/etcd-external/ca.crt
                        certFile:
                          type: string
                          default: /etc/kubernetes/pki/etcd-external/client.crt
                        keyFile:
                          type: string
                          default: /etc/kubernetes/pki/etcd-external/client.key
                dryRun:
                  type: boolean
                  description: >-
                    When true, validates all prerequisites (SSH connectivity,
                    bootstrap data, secrets) but does not execute the bootstrap
                    script.
                remediation:
                  type: object
                  properties:
                    reboot:
                      type: object
                      properties:
                        requestedAt:
                          type: string
                          format: date-time
                          description: Timestamp token used to request an in-band SSH reboot.
                providerID:
                  type: string
                  description: "Provider ID in the format ssh://<address>."
                paused:
                  type: boolean
                  description: Indicates the resource is paused and will not be reconciled.
            status:
              type: object
              properties:
                initialization:
                  type: object
                  properties:
                    provisioned:
                      type: boolean
                      description: True when the machine has been bootstrapped.
                addresses:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - Hostname
                          - InternalIP
                          - ExternalIP
                      address:
                        type: string
                  description: Network addresses of the machine.
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                failureReason:
                  type: string
                failureMessage:
                  type: string
                remediation:
                  type: object
                  properties:
                    reboot:
                      type: object
                      properties:
                        lastRequestedAt:
                          type: string
                        lastCompletedAt:
                          type: string
                          format: date-time
                        success:
                          type: boolean
                        message:
                          type: string
      additionalPrinterColumns:
        - name: Address
          type: string
          jsonPath: .spec.address
        - name: ProviderID
          type: string
          jsonPath: .spec.providerID
        - name: Ready
          type: boolean
          jsonPath: .status.initialization.provisioned
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: sshmachines
    singular: sshmachine
    kind: SSHMachine
    shortNames:
      - sshm
    categories:
      - cluster-api
