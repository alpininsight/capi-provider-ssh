apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sshmachines.infrastructure.alpininsight.ai
  labels:
    cluster.x-k8s.io/provider: infrastructure-ssh
spec:
  group: infrastructure.alpininsight.ai
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - address
              properties:
                address:
                  type: string
                  description: SSH-reachable hostname or IP (e.g. Tailscale IP).
                port:
                  type: integer
                  default: 22
                  minimum: 1
                  maximum: 65535
                  description: SSH port.
                user:
                  type: string
                  default: root
                  description: SSH user for authentication.
                sshKeyRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the Secret containing the SSH private key.
                    key:
                      type: string
                      default: value
                      description: Key within the Secret that holds the private key data.
                providerID:
                  type: string
                  description: "Provider ID in the format ssh://<address>."
                paused:
                  type: boolean
                  description: Indicates the resource is paused and will not be reconciled.
            status:
              type: object
              properties:
                initialization:
                  type: object
                  properties:
                    provisioned:
                      type: boolean
                      description: True when the machine has been bootstrapped.
                addresses:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        enum:
                          - Hostname
                          - InternalIP
                          - ExternalIP
                      address:
                        type: string
                  description: Network addresses of the machine.
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                failureReason:
                  type: string
                failureMessage:
                  type: string
      printColumns:
        - name: Address
          type: string
          jsonPath: .spec.address
        - name: ProviderID
          type: string
          jsonPath: .spec.providerID
        - name: Ready
          type: boolean
          jsonPath: .status.initialization.provisioned
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: sshmachines
    singular: sshmachine
    kind: SSHMachine
    shortNames:
      - sshm
    categories:
      - cluster-api
