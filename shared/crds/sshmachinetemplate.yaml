apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sshmachinetemplates.infrastructure.alpininsight.ai
  labels:
    cluster.x-k8s.io/provider: infrastructure-ssh
spec:
  group: infrastructure.alpininsight.ai
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - template
              properties:
                template:
                  type: object
                  required:
                    - spec
                  properties:
                    spec:
                      type: object
                      description: >-
                        Either address (direct SSH) or hostSelector (pool-based
                        selection from SSHHost inventory) must be provided.
                      properties:
                        address:
                          type: string
                          description: SSH-reachable hostname or IP (direct mode).
                        port:
                          type: integer
                          default: 22
                          minimum: 1
                          maximum: 65535
                        user:
                          type: string
                          default: root
                        sshKeyRef:
                          type: object
                          required:
                            - name
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                              default: value
                        hostSelector:
                          type: object
                          description: >-
                            Label selector for SSHHost pool-based selection.
                            Takes precedence over address if both are set.
                          properties:
                            matchLabels:
                              type: object
                              additionalProperties:
                                type: string
                              description: Labels that SSHHost CRs must match.
  scope: Namespaced
  names:
    plural: sshmachinetemplates
    singular: sshmachinetemplate
    kind: SSHMachineTemplate
    shortNames:
      - sshmt
    categories:
      - cluster-api
